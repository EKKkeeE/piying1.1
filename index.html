<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手势皮影 · 孙悟空</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="stage-stone" class="stage-stone" aria-hidden="true">
        <img
          class="stone-slab-bg"
          src="assets/bg/stone/slab.jpg?v=4"
          alt=""
          draggable="false"
          decoding="async"
        />
        <div class="stone-groove-wrap" aria-hidden="true">
          <img
            class="stone-groove-overlay"
            src="assets/bg/stone/hand_groove_cutout.png?v=16"
            alt=""
            draggable="false"
            decoding="async"
          />
        </div>
        <canvas
          class="stone-slab-composite"
          hidden
          aria-hidden="true"
        ></canvas>
        <canvas id="stone-shatter-canvas" class="stone-shatter-canvas" hidden></canvas>
      </div>

      <div id="stage" class="stage stage-hidden" aria-hidden="true"></div>

      <div id="stage-interaction" class="stage-interaction" aria-hidden="true">
        <canvas id="string-canvas"></canvas>
      </div>

      <div id="rescue-success" class="rescue-success" hidden aria-hidden="true">
        <div class="rescue-success-rays" aria-hidden="true"></div>
        <div class="rescue-success-flash-core" aria-hidden="true"></div>
        <div class="rescue-success-flash" aria-hidden="true"></div>
        <div class="rescue-success-climax" aria-hidden="true"></div>
      </div>

      <div id="puppet-mount-player" class="puppet-mount"></div>

      <div id="rescue-success-title" class="rescue-success-title" aria-label="挑战成功" hidden aria-hidden="true">
        <img class="rescue-char" src="assets/ui/dasheng_char_0_clean.png?v=7" alt="挑" draggable="false" />
        <img class="rescue-char" src="assets/ui/dasheng_char_1.png?v=6" alt="战" draggable="false" />
        <img class="rescue-char" src="assets/ui/dasheng_char_2.png?v=6" alt="成" draggable="false" />
        <img class="rescue-char" src="assets/ui/dasheng_char_3_clean.png?v=7" alt="功" draggable="false" />
      </div>

      <div id="binding-hint" class="binding-hint puppet-frame" hidden></div>

      <div id="camera-panel" class="camera-panel">
        <video id="camera" playsinline muted autoplay></video>
        <canvas id="debug-canvas" class="debug-canvas"></canvas>
      </div>

      <div id="start-overlay" class="start-overlay">
        <div class="start-card puppet-frame">
          <div class="start-card-header">
            <span class="start-card-ornament" aria-hidden="true"></span>
            <h1>手势皮影 · 孙悟空</h1>
          </div>
          <p class="tips">举起<strong>左手</strong>，将手指与皮影部件绑定</p>
          <button id="start-btn" type="button">举起左手，开始演出</button>
          <p id="error-box" class="error-box" hidden></p>
        </div>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
